name: Publish NPM Package

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build library package
        run: pnpm nx build agentj-components --configuration=production --skip-nx-cache

      - name: Read package metadata
        id: pkg
        run: |
          node -e "const pkg=require('./dist/libs/agentj-design-system-components/package.json'); console.log('name=' + pkg.name); console.log('version=' + pkg.version);" >> "$GITHUB_OUTPUT"

      - name: Show publish candidate
        run: echo "Publishing candidate: ${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}"

      - name: Check if version exists on npm
        id: npm_check
        run: |
          if npm view "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm_check.outputs.already_published != 'true'
        run: npm publish dist/libs/agentj-design-system-components --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip publish (already exists)
        if: steps.npm_check.outputs.already_published == 'true'
        run: echo "Version already exists on npm. Skipping publish."
